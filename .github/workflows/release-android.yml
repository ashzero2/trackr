# Build Android (APK) locally with EAS and attach to a GitHub Release when you push a version tag.
#
# Setup:
# 1. Repo → Settings → Secrets → Actions: add EXPO_TOKEN from https://expo.dev/accounts/[account]/settings/access-tokens
# 2. Push a tag: git tag v1.0.0 && git push origin v1.0.0
#    Or run this workflow manually (APK is kept as a workflow artifact, not a Release).
#
# Uses eas.json profile "preview" (APK) with --local (builds on the runner, no EAS cloud credits).

name: Release Android (EAS Local)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: eas-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: EAS Local Build & release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: EAS Local Build (APK)
        id: eas
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail
          APK="trackr-android-${GITHUB_REF_NAME:-manual}.apk"
          npx eas build -p android -e preview --local --non-interactive --output="$APK"
          echo "apk=$APK" >> "$GITHUB_OUTPUT"
          ls -la "$APK"

      - name: Upload APK artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: trackr-android-apk
          path: ${{ steps.eas.outputs.apk }}

      - name: Create GitHub Release with APK
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.eas.outputs.apk }}
          generate_release_notes: true
